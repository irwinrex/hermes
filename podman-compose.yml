# Hermes Agent + Ollama (local models) + Opencode Zen API
# Run: podman-compose up -d

services:
  ollama:
    image: hermes-ollama:latest
    build:
      context: .
      dockerfile: ollama.Dockerfile
    container_name: hermes-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_CONTEXT_LENGTH=64000
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM_LIMIT:-14G}
        reservations:
          memory: ${OLLAMA_MEM_RESERVE:-4G}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - hermes-net

  hermes-gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./hermes-data:/opt/data
      - ./hermes-config:/config:ro
    ports:
      - "127.0.0.1:9119:9119"
    env_file:
      - .env.ollama
      - ./hermes-config/.env.hermes
    networks:
      - hermes-net

  hermes-chat:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-chat
    restart: unless-stopped
    command: sleep infinity
    depends_on:
      - hermes-gateway
    volumes:
      - ./hermes-data:/opt/data
      - ./hermes-config:/config:ro
    env_file:
      - .env.ollama
      - ./hermes-config/.env.hermes
    networks:
      - hermes-net
    stdin_open: true
    tty: true

networks:
  hermes-net:
    driver: bridge

volumes:
  ollama_data:
